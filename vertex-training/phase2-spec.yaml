# Phase 2 training spec — bootstrapped from Phase 1, sharper reward, seed search.
# Goal: gen5_master solves on pure greedy (1 marble in center).
#
# Two-step approach:
#   1. Bootstrap from Phase 1's gen5_master checkpoint (same network shape)
#   2. Run high-MCTS seed search at startup to find ≤2-marble trajectories
#   3. Seed examples added to replay buffer (replicated N× for weight)
#   4. Standard training proceeds from there
#
# Replace placeholders before submitting:
#   PHASE2_IMAGE       — image tag printed by build.sh
#   YOUR_PROJECT       — your GCP project id
#   YOUR_BUCKET        — your GCS bucket for artifacts

workerPoolSpecs:
  - machineSpec:
      machineType: n1-standard-4
      acceleratorType: NVIDIA_TESLA_T4
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: gcr.io/YOUR_PROJECT/marble-solitaire-training:PHASE2_IMAGE
      args:
        - --iterations=750
        - --episodes=50
        - --simulations=200
        - --channels=64
        - --n-blocks=3
        - --checkpoint-iters=1,15,50,150,250,500,750
        - --bootstrap-checkpoint=gs://YOUR_BUCKET/marble-solitaire/phase1/iter_500.pt
        - --seed-attempts=30
        - --seed-sims=3000
        - --seed-copies=10
      env:
        - name: AIP_MODEL_DIR
          value: gs://YOUR_BUCKET/marble-solitaire/phase2/
        - name: PYTHONUNBUFFERED
          value: "1"
baseOutputDirectory:
  outputUriPrefix: gs://YOUR_BUCKET/marble-solitaire/phase2/
