# Phase 2 training spec — bigger network, sharper reward, seed solutions.
# Goal: gen5_master solves on pure greedy (1 marble in center).
#
# Two-step approach:
#   1. Bootstrap from Phase 1's gen5_master checkpoint (also 64ch — keep architecture matching)
#   2. Run high-MCTS seed search at startup to find ≤2-marble solutions
#   3. Seed examples added to replay buffer (replicated 10x for weight)
#   4. Standard training proceeds from there
#
# Submit:
#   ./vertex-training/build.sh
#   # Edit imageUri below to match new build, then:
#   gcloud ai custom-jobs create --region=us-central1 \
#     --display-name=marble-solitaire-phase2 \
#     --config=vertex-training/phase2-spec.yaml \
#     --project=ai-dev-463705

workerPoolSpecs:
  - machineSpec:
      machineType: n1-standard-4
      acceleratorType: NVIDIA_TESLA_T4
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: gcr.io/ai-dev-463705/marble-solitaire-training:20260517-225212
      args:
        - --iterations=750
        - --episodes=50
        - --simulations=200
        - --channels=64
        - --n-blocks=3
        - --checkpoint-iters=1,15,50,150,250,500,750
        - --bootstrap-checkpoint=gs://ai-dev-463705-ml-artifacts/marble-solitaire/run-20260511c/iter_500.pt
        - --seed-attempts=30
        - --seed-sims=3000
        - --seed-copies=10
      env:
        - name: AIP_MODEL_DIR
          value: gs://ai-dev-463705-ml-artifacts/marble-solitaire/phase2/
        - name: PYTHONUNBUFFERED
          value: "1"
baseOutputDirectory:
  outputUriPrefix: gs://ai-dev-463705-ml-artifacts/marble-solitaire/phase2/
