steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE_URI}'
      - '-f'
      - 'vertex-training/Dockerfile'
      - '.'
images:
  - '${_IMAGE_URI}'
# Run as a dedicated build SA scoped to Cloud Build + Artifact Registry only.
# Replace with your project + SA, or remove this line to use the default
# Cloud Build SA.
serviceAccount: 'projects/YOUR_PROJECT/serviceAccounts/cloudbuild-deploy@YOUR_PROJECT.iam.gserviceaccount.com'
options:
  logging: CLOUD_LOGGING_ONLY
