# Phase 3 — pure-discovery training, no seed cheating.
#
# Strategy: bootstrap from Phase 2's iter_250 (already plays well, avg 2 marbles),
# then continue training with two pure-discovery improvements:
#   1. Curriculum: 30% of episodes start from a random mid/late-game position
#      reached by random play. All states are legally reachable — no answers
#      injected. Gives concentrated endgame practice.
#   2. Higher Dirichlet noise (0.5 vs 0.3) — more root exploration to break
#      out of the "always stop at 2 marbles" local optimum.
#
# Outcome: regressed — over-explored, lost what Phase 2 taught.
#
# Replace placeholders before submitting:
#   PHASE3_IMAGE       — image tag printed by build.sh
#   YOUR_PROJECT       — your GCP project id
#   YOUR_BUCKET        — your GCS bucket for artifacts

workerPoolSpecs:
  - machineSpec:
      machineType: n1-standard-4
      acceleratorType: NVIDIA_TESLA_T4
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: gcr.io/YOUR_PROJECT/marble-solitaire-training:PHASE3_IMAGE
      args:
        - --iterations=200
        - --episodes=50
        - --simulations=200
        - --channels=64
        - --n-blocks=3
        - --checkpoint-iters=1,25,50,75,100,150,200
        - --bootstrap-checkpoint=gs://YOUR_BUCKET/marble-solitaire/phase2/iter_250.pt
        - --curriculum-fraction=0.3
        - --curriculum-min-marbles=5
        - --curriculum-max-marbles=12
        - --dirichlet-epsilon=0.5
      env:
        - name: AIP_MODEL_DIR
          value: gs://YOUR_BUCKET/marble-solitaire/phase3/
        - name: PYTHONUNBUFFERED
          value: "1"
baseOutputDirectory:
  outputUriPrefix: gs://YOUR_BUCKET/marble-solitaire/phase3/
